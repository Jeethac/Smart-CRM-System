<!DOCTYPE html>
<html>
<head>
    <title>Lead Source Analysis</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="container mt-5">

    <h2 class="text-center mb-4">Lead Source Performance Analyzer</h2>

    <!-- Total Leads -->
    <div class="alert alert-primary text-center">
        <strong>Total Leads: {{ total_leads }}</strong>
    </div>

    <div class="row">
        
        <!-- Table -->
        <div class="col-md-6">
            <table class="table table-bordered table-striped">
                <thead class="table-dark">
                    <tr>
                        <th>Source</th>
                        <th>Total Leads</th>
                        <th>Percentage</th>
                    </tr>
                </thead>
                <tbody>
                    {% for item in data %}
                    <tr>
                        <td>{{ item.source }}</td>
                        <td>{{ item.count }}</td>
                        <td>{{ item.percentage }}%</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>

        <!-- Pie Chart -->
        <div class="col-md-6">
            <canvas id="pieChart"></canvas>
        </div>

    </div>
</div>

<!-- Chart Script -->
<script>
    const data = {
        labels: [
            {% for item in data %}
                "{{ item.source }}",
            {% endfor %}
        ],
        datasets: [{
            data: [
                {% for item in data %}
                    {{ item.count }},
                {% endfor %}
            ],
            backgroundColor: [
                '#FF6384',
                '#36A2EB',
                '#FFCE56',
                '#4BC0C0',
                '#9966FF'
            ]
        }]
    };

    const config = {
        type: 'pie',
        data: data
    };

    new Chart(
        document.getElementById('pieChart'),
        config
    );
</script>

</body>
</html>
